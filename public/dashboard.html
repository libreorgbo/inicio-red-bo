<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard — inicio.red.bo</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body, 'DM Sans', sans-serif);
      background: var(--clr-bg-0, #07070d);
      color: var(--clr-text-primary, #fff);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .dash-sidebar {
      width: 260px; min-width: 260px;
      background: var(--clr-bg-1, #0e0e1a);
      border-right: 1px solid var(--clr-border, rgba(255,255,255,.08));
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .dash-sidebar-logo {
      padding: 20px 24px;
      font-family: var(--font-display, 'Sora', sans-serif);
      font-size: 18px; font-weight: 700;
      border-bottom: 1px solid var(--clr-border, rgba(255,255,255,.08));
    }
    .dash-sidebar-logo span { color: var(--clr-accent, #7c6eff); }
    .dash-nav { flex: 1; padding: 12px 0; }
    .dash-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px; cursor: pointer;
      color: var(--clr-text-secondary, rgba(255,255,255,.55));
      border-radius: 0; transition: all 150ms;
      font-size: 14px; border: none; background: none;
      width: 100%; text-align: left;
    }
    .dash-nav-item:hover { color: var(--clr-text-primary); background: var(--clr-surface); }
    .dash-nav-item.active { color: var(--clr-accent, #7c6eff); background: rgba(124,110,255,.1); }
    .dash-nav-icon { font-size: 18px; width: 24px; text-align: center; }
    .dash-sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--clr-border);
      font-size: 12px; color: var(--clr-text-muted);
    }
    .dash-sidebar-footer a { color: var(--clr-text-secondary); text-decoration: none; }

    /* ── MAIN ── */
    .dash-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dash-topbar {
      height: 60px; min-height: 60px;
      background: var(--glass-bg, rgba(255,255,255,.05));
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--clr-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
    }
    .dash-breadcrumb { font-size: 14px; color: var(--clr-text-secondary); }
    .dash-breadcrumb strong { color: var(--clr-text-primary); }
    .dash-user { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .dash-user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--clr-accent, #7c6eff);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }
    .dash-user-avatar img { width: 32px; height: 32px; border-radius: 50%; }
    .dash-user-logout { color: var(--clr-text-secondary); text-decoration: none; font-size: 12px; }

    /* ── MODULE VIEW ── */
    #module-view {
      flex: 1; overflow-y: auto; padding: 32px;
      background: var(--clr-bg-0, #07070d);
    }

    /* ── CARDS ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 900px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
    .stat-card {
      background: var(--clr-bg-1); border: 1px solid var(--clr-border);
      border-radius: 12px; padding: 20px;
    }
    .stat-label { font-size: 12px; color: var(--clr-text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--clr-text-primary); }
    .stat-accent { color: var(--clr-accent); }

    /* ── TABLES ── */
    .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--clr-border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--clr-bg-2); }
    th { padding: 12px 16px; text-align: left; font-weight: 500; color: var(--clr-text-secondary); }
    td { padding: 12px 16px; border-top: 1px solid var(--clr-border); vertical-align: middle; }
    tr:hover td { background: var(--clr-bg-2); }

    /* ── BUTTONS ── */
    .btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; transition: all 150ms; }
    .btn-primary { background: var(--clr-accent); color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-success { background: rgba(74,222,128,.15); color: var(--clr-success, #4ade80); border-color: rgba(74,222,128,.3); }
    .btn-success:hover { background: rgba(74,222,128,.25); }
    .btn-warning { background: rgba(251,191,36,.15); color: var(--clr-warning, #fbbf24); border-color: rgba(251,191,36,.3); }
    .btn-warning:hover { background: rgba(251,191,36,.25); }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--clr-danger, #f87171); border-color: rgba(248,113,113,.3); }
    .btn-danger:hover { background: rgba(248,113,113,.25); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-admin { background: rgba(124,110,255,.2); color: var(--clr-accent); }
    .badge-super { background: rgba(255,110,124,.2); color: var(--clr-accent-2, #ff6e7c); }
    .badge-user { background: var(--clr-surface); color: var(--clr-text-secondary); }
    .badge-ai { background: rgba(74,222,128,.15); color: var(--clr-success); }
    .badge-manual { background: var(--clr-surface); color: var(--clr-text-muted); }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-input { display: none; }
    .toggle-label {
      width: 40px; height: 22px; background: var(--clr-bg-3);
      border-radius: 99px; cursor: pointer; position: relative;
      transition: background 250ms; display: block;
    }
    .toggle-label::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--clr-text-muted); transition: all 250ms;
    }
    .toggle-input:checked + .toggle-label { background: var(--clr-accent); }
    .toggle-input:checked + .toggle-label::after { transform: translateX(18px); background: #fff; }

    /* ── FORM ── */
    .form-grid { display: grid; gap: 16px; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: var(--clr-text-secondary); }
    .form-input, .form-select, .form-textarea {
      background: var(--clr-bg-2); border: 1px solid var(--clr-border);
      color: var(--clr-text-primary); border-radius: 8px; padding: 9px 12px;
      font-size: 13px; font-family: inherit; transition: border-color 150ms;
      width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--clr-accent);
    }
    .form-textarea { min-height: 100px; resize: vertical; }

    /* ── SEO PREVIEW ── */
    .seo-preview {
      border: 1px solid var(--clr-border); border-radius: 12px;
      padding: 16px; background: var(--clr-bg-1);
      margin-top: 16px;
    }
    .seo-preview-site { font-size: 12px; color: var(--clr-success); margin-bottom: 4px; }
    .seo-preview-title { font-size: 18px; color: #4285f4; margin-bottom: 4px; }
    .seo-preview-desc { font-size: 13px; color: var(--clr-text-secondary); }

    /* ── BAR CHART ── */
    .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 80px; margin-top: 8px; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .chart-bar { width: 100%; background: var(--clr-accent); border-radius: 4px 4px 0 0; min-height: 4px; }
    .chart-day { font-size: 10px; color: var(--clr-text-muted); }

    /* ── PROGRESS BAR ── */
    .progress-bar { height: 6px; background: var(--clr-bg-3); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--clr-accent); border-radius: 99px; transition: width 500ms; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }
    .modal-overlay[hidden] { display: none; }
    .modal-box {
      background: var(--clr-bg-1); border: 1px solid var(--clr-border);
      border-radius: 16px; padding: 28px; max-width: 600px; width: 100%;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--clr-text-muted); cursor: pointer; font-size: 20px; }

    /* ── SECTIONS ── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 20px; font-weight: 600; }
    .section-sub { font-size: 14px; color: var(--clr-text-muted); margin-top: 4px; }

    /* ── TAG INPUT (keywords) ── */
    .tags-input { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: rgba(124,110,255,.15); color: var(--clr-accent); border-radius: 6px; padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .tag button { background: none; border: none; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; }

    /* ── FIELD BUILDER ── */
    .field-row {
      display: grid; grid-template-columns: 1fr 1fr auto auto;
      gap: 8px; align-items: center;
      background: var(--clr-bg-2); border-radius: 8px; padding: 10px;
    }
    .drag-handle { cursor: grab; color: var(--clr-text-muted); font-size: 16px; }
    .json-preview {
      background: var(--clr-bg-2); border: 1px solid var(--clr-border);
      border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px;
      color: var(--clr-text-secondary); max-height: 200px; overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="dash-sidebar">
  <div class="dash-sidebar-logo">inicio<span>.red.bo</span></div>
  <nav class="dash-nav" id="dash-nav">
    <button class="dash-nav-item active" data-module="overview"><span class="dash-nav-icon">📊</span> Overview</button>
    <button class="dash-nav-item" data-module="moderation"><span class="dash-nav-icon">✅</span> Moderación</button>
    <button class="dash-nav-item" data-module="engines"><span class="dash-nav-icon">🔍</span> Buscadores</button>
    <button class="dash-nav-item" data-module="ads"><span class="dash-nav-icon">📢</span> Publicidad</button>
    <button class="dash-nav-item" data-module="seo"><span class="dash-nav-icon">🎯</span> SEO</button>
    <button class="dash-nav-item" data-module="users"><span class="dash-nav-icon">👥</span> Usuarios</button>
    <button class="dash-nav-item" data-module="harvester"><span class="dash-nav-icon">🤖</span> AI Harvester</button>
    <button class="dash-nav-item" data-module="module-builder"><span class="dash-nav-icon">🧩</span> Plugin Builder</button>
    <div id="dynamic-nav-items"></div>
  </nav>
  <div class="dash-sidebar-footer">
    <a href="/">← Volver al sitio</a>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="dash-main">
  <header class="dash-topbar">
    <div class="dash-breadcrumb">Dashboard / <strong id="current-module-name">Overview</strong></div>
    <div class="dash-user">
      <div class="dash-user-avatar" id="user-avatar">?</div>
      <span id="user-display-name">Cargando...</span>
      <a href="/auth/logout" class="dash-user-logout">Salir</a>
    </div>
  </header>
  <main id="module-view" role="main"></main>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── GLOBAL STATE ──────────────────────────────────────────────
window.DashState = { user: null, module: 'overview', data: {} };

// ── API HELPER ────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  if (res.status === 401) { window.location.href = '/auth/google'; return null; }
  return res.json().catch(() => null);
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').hidden = false;
}
function closeModal() { document.getElementById('modal-overlay').hidden = true; }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

// ── ESCAPE ────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-BO', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── ROUTER ────────────────────────────────────────────────────
const MODULES = {
  overview:       renderModuleOverview,
  moderation:     renderModuleModeration,
  engines:        renderModuleEngines,
  ads:            renderModuleAds,
  seo:            renderModuleSEO,
  users:          renderModuleUsers,
  harvester:      renderModuleHarvester,
  'module-builder': renderModuleModuleBuilder
};

async function navigateTo(slug) {
  window.DashState.module = slug;
  document.querySelectorAll('.dash-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.module === slug);
  });
  document.getElementById('current-module-name').textContent =
    document.querySelector(`[data-module="${slug}"]`)?.textContent?.trim() || slug;

  const view = document.getElementById('module-view');
  view.innerHTML = '<div style="padding:40px;text-align:center;color:var(--clr-text-muted)">Cargando...</div>';

  const fn = MODULES[slug] || renderDynamicModule;
  await fn(slug);
}

document.getElementById('dash-nav').addEventListener('click', e => {
  const btn = e.target.closest('.dash-nav-item');
  if (btn?.dataset.module) navigateTo(btn.dataset.module);
});

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  const me = await api('/api/auth/me');
  if (me?.user) {
    window.DashState.user = me.user;
    document.getElementById('user-display-name').textContent = me.user.display_name || me.user.email;
    const avatarEl = document.getElementById('user-avatar');
    if (me.user.avatar_url) {
      avatarEl.innerHTML = `<img src="${esc(me.user.avatar_url)}" alt="">`;
    } else {
      avatarEl.textContent = (me.user.display_name || 'U')[0].toUpperCase();
    }
  }
  await loadDynamicNav();
  await navigateTo('overview');
}

async function loadDynamicNav() {
  const mods = await api('/api/modules/active');
  if (!Array.isArray(mods)) return;
  const container = document.getElementById('dynamic-nav-items');
  container.innerHTML = mods.map(m => `
    <button class="dash-nav-item" data-module="${esc(m.module_slug)}" data-dynamic="1">
      <span class="dash-nav-icon">${esc(m.sidebar_icon)}</span> ${esc(m.module_name)}
    </button>
  `).join('');
  mods.forEach(m => { MODULES[m.module_slug] = () => renderDynamicModule(m.module_slug, m); });
}

// ═══════════════════════════════════════════════════════════════
// MÓDULO: OVERVIEW
// ═══════════════════════════════════════════════════════════════
async function renderModuleOverview() {
  const data = await api('/api/admin/stats');
  if (!data) return;
  const { stats, recentLinks, weeklyActivity } = data;

  const maxClicks = Math.max(...(weeklyActivity || []).map(d => d.clicks || 0), 1);
  const bars = (weeklyActivity || []).map(d => {
    const pct = Math.round(((d.clicks || 0) / maxClicks) * 100);
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${pct}%"></div>
      <div class="chart-day">${d.day?.slice(5) || ''}</div>
    </div>`;
  }).join('');

  document.getElementById('module-view').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Links Aprobados</div><div class="stat-value">${stats.totalLinks}</div></div>
      <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value stat-accent">${stats.pendingLinks}</div></div>
      <div class="stat-card"><div class="stat-label">Clics Hoy</div><div class="stat-value">${stats.todayClicks}</div></div>
      <div class="stat-card"><div class="stat-label">Impresiones Ads Hoy</div><div class="stat-value">${stats.todayImpressions}</div></div>
    </div>
    <div style="background:var(--clr-bg-1);border:1px solid var(--clr-border);border-radius:12px;padding:20px;margin-bottom:24px">
      <div style="font-size:14px;font-weight:500;margin-bottom:12px">Actividad últimos 7 días</div>
      <div class="chart-bars">${bars || '<span style="color:var(--clr-text-muted)">Sin datos</span>'}</div>
    </div>
    <div style="background:var(--clr-bg-1);border:1px solid var(--clr-border);border-radius:12px;padding:20px">
      <div style="font-size:14px;font-weight:500;margin-bottom:16px">Últimos enlaces recibidos</div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Título</th><th>Categoría</th><th>Origen</th><th>Fecha</th></tr></thead>
          <tbody>
            ${(recentLinks || []).map(l => `
              <tr>
                <td>${esc(l.titulo)}</td>
                <td>${esc(l.category_name || '—')}</td>
                <td><span class="badge ${l.origen === 'AI_Harvester' ? 'badge-ai' : 'badge-manual'}">${esc(l.origen)}</span></td>
                <td>${formatDate(l.created_at)}</td>
              </tr>
            `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--clr-text-muted)">Sin datos</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// MÓDULO: MODERACIÓN
// ═══════════════════════════════════════════════════════════════
async function renderModuleModeration(page = 0) {
  const data = await api(`/api/admin/links?approved=0&page=${page}&limit=20`);
  if (!data) return;

  document.getElementById('module-view').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Cola de Moderación</div><div class="section-sub">${data.total} enlaces pendientes</div></div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Enlace</th><th>Categoría</th><th>Origen</th><th>Usuario</th><th>Fecha</th><th>Acciones</th></tr></thead>
        <tbody id="moderation-tbody">
          ${(data.links || []).map(l => `
            <tr id="link-row-${l.link_id}">
              <td>
                <div style="display:flex;align-items:center;gap:8px">
                  <img src="https://www.google.com/s2/favicons?sz=32&domain=${esc(new URL(l.url_final||'https://x.com').hostname)}"
                       width="16" height="16" style="border-radius:50%" onerror="this.style.display='none'">
                  <div>
                    <div style="font-weight:500">${esc(l.titulo)}</div>
                    <div style="font-size:11px;color:var(--clr-text-muted)">${esc(l.url_final?.slice(0,60))}</div>
                  </div>
                </div>
              </td>
              <td><span class="badge badge-user">${esc(l.category_name||'—')}</span></td>
              <td><span class="badge ${l.origen==='AI_Harvester'?'badge-ai':'badge-manual'}">${esc(l.origen)}</span></td>
              <td>${esc(l.user_name||l.user_email||'anon')}</td>
              <td>${formatDate(l.created_at)}</td>
              <td>
                <div class="actions-cell">
                  <button class="btn btn-success btn-sm" onclick="approveLink(${l.link_id},'user')">✅ +Referido</button>
                  <button class="btn btn-warning btn-sm" onclick="approveLink(${l.link_id},'owner')">💰 +Mi Afil.</button>
                  <button class="btn btn-danger btn-sm" onclick="rejectLink(${l.link_id})">❌</button>
                </div>
              </td>
            </tr>
          `).join('') || '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--clr-text-muted)">Sin enlaces pendientes ✅</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

async function approveLink(id, mode) {
  const ok = await api(`/api/admin/links/${id}/approve?mode=${mode}`, { method: 'PUT' });
  if (ok?.success) document.getElementById(`link-row-${id}`)?.remove();
}
async function rejectLink(id) {
  if (!confirm('¿Eliminar este enlace?')) return;
  const ok = await api(`/api/admin/links/${id}/reject`, { method: 'DELETE' });
  if (ok?.success) document.getElementById(`link-row-${id}`)?.remove();
}

// ═══════════════════════════════════════════════════════════════
// MÓDULO: BUSCADORES
// ═══════════════════════════════════════════════════════════════
async function renderModuleEngines() {
  const engines = await api('/api/admin/engines');

  document.getElementById('module-view').innerHTML = `
    <div class="section-header">
      <div class="section-title">Gestión de Buscadores</div>

      </div>
    </div>
    <button class="btn btn-primary" onclick="createPlugin()">💾 Crear Módulo Plugin</button>
  `;

function autoSlug() {
  const name = document.getElementById('mod-name')?.value || '';
  document.getElementById('mod-slug').value = name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  updatePluginPreview();
}

function addPluginField() {
  pluginFields.push({ name: '', type: 'text', label: '', required: false });
  renderFieldsList();
}

function removePluginField(i) {
  pluginFields.splice(i, 1);
  renderFieldsList();
}

function renderFieldsList() {
  const list = document.getElementById('fields-list');
  if (!list) return;
  list.innerHTML = pluginFields.map((f, i) => `
    <div class="field-row" draggable="true">
      <input class="form-input" placeholder="nombre_campo" value="${esc(f.name)}" oninput="updateField(${i},'name',this.value)" style="font-size:12px">
      <select class="form-select" onchange="updateField(${i},'type',this.value)" style="font-size:12px">
        ${['text','number','email','url','toggle','datetime','select','textarea'].map(t => `<option value="${t}" ${f.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input class="form-input" placeholder="Label" value="${esc(f.label)}" oninput="updateField(${i},'label',this.value)" style="font-size:12px">
      <button class="btn btn-danger btn-sm" onclick="removePluginField(${i})">✕</button>
    </div>
  `).join('');
  updatePluginPreview();
}

function updateField(i, key, val) {
  pluginFields[i][key] = val;
  updatePluginPreview();
}

function updatePluginPreview() {
  const preview = document.getElementById('mod-json-preview');
  if (!preview) return;
  const obj = { table: { columns: ['id', ...pluginFields.map(f=>f.name).filter(Boolean)] }, form: { fields: pluginFields.map(f=>({ name:f.name, type:f.type, label:f.label||f.name, required:f.required })) } };
  preview.textContent = JSON.stringify(obj, null, 2);
}

async function createPlugin() {
  const body = {
    module_name: document.getElementById('mod-name').value,
    module_slug: document.getElementById('mod-slug').value,
    sidebar_icon: document.getElementById('mod-icon').value,
    schema_patch: document.getElementById('mod-schema').value,
    ui_component_json: JSON.stringify({ table: { columns: ['id', ...pluginFields.map(f=>f.name).filter(Boolean)], searchable: [], sortable: [] }, form: { fields: pluginFields } }),
    routes_config: JSON.stringify([
      { method: 'GET', action: 'list', path: `/api/modules/${document.getElementById('mod-slug').value}` },
      { method: 'POST', action: 'create', path: `/api/modules/${document.getElementById('mod-slug').value}` },
      { method: 'PUT', action: 'update', path: `/api/modules/${document.getElementById('mod-slug').value}/{id}` },
      { method: 'DELETE', action: 'delete', path: `/api/modules/${document.getElementById('mod-slug').value}/{id}` }
    ])
  };

  const res = await api('/api/admin/modules', { method: 'POST', body: JSON.stringify(body) });
  if (res?.success) {
    alert(`✅ ${res.message}`);
    await loadDynamicNav();
    renderModuleModuleBuilder();
  } else {
    alert(`❌ Error: ${res?.error || 'desconocido'}`);
  }
}

// MÓDULO DINÁMICO (plugins creados por usuarios)
// ═══════════════════════════════════════════════════════════════
async function renderDynamicModule(slug, moduleData) {
  if (!moduleData) {
    const mods = await api('/api/modules/active');
    moduleData = (mods || []).find(m => m.module_slug === slug);
  }
  if (!moduleData) { document.getElementById('module-view').innerHTML = '<div style="padding:40px;color:var(--clr-text-muted)">Módulo no encontrado</div>'; return; }

  const ui = JSON.parse(moduleData.ui_component_json || '{}');
  const cols = ui.table?.columns || [];
  const fields = ui.form?.fields || [];

  const data = await api(`/api/modules/${slug}`);
  const records = data?.records || [];

  document.getElementById('module-view').innerHTML = `
    <div class="section-header">
      <div class="section-title">${esc(moduleData.sidebar_icon)} ${esc(moduleData.module_name)}</div>
      <button class="btn btn-primary" onclick="openDynamicCreateModal('${slug}', ${esc(JSON.stringify(fields))})">+ Nuevo Registro</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr>${cols.map(c => `<th>${esc(c)}</th>`).join('')}<th>Acciones</th></tr></thead>
        <tbody>
          ${records.map(r => `
            <tr>
              ${cols.map(c => `<td>${esc(String(r[c] ?? '—'))}</td>`).join('')}
              <td><button class="btn btn-danger btn-sm" onclick="deleteDynamicRecord('${slug}',${r.id})">🗑</button></td>
            </tr>
          `).join('') || `<tr><td colspan="${cols.length+1}" style="text-align:center;padding:24px;color:var(--clr-text-muted)">Sin registros</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

function openDynamicCreateModal(slug, fields) {
  openModal('Nuevo Registro', `
    <div class="form-grid">
      ${fields.map(f => `
        <div class="form-group">
          <label>${esc(f.label||f.name)}</label>
          ${f.type === 'textarea' ? `<textarea class="form-textarea" id="dyn-field-${esc(f.name)}"></textarea>` :
            f.type === 'toggle' ? `<div class="toggle-wrap"><input type="checkbox" class="toggle-input" id="dyn-field-${esc(f.name)}"><label class="toggle-label" for="dyn-field-${esc(f.name)}"></label></div>` :
            `<input class="form-input" type="${f.type==='number'?'number':f.type==='datetime'?'datetime-local':'text'}" id="dyn-field-${esc(f.name)}">`}
        </div>
      `).join('')}
      <button class="btn btn-primary" onclick="createDynamicRecord('${slug}', ${esc(JSON.stringify(fields))})">Crear</button>
    </div>
  `);
}

async function createDynamicRecord(slug, fields) {
  const body = {};
  fields.forEach(f => {
    const el = document.getElementById(`dyn-field-${f.name}`);
    if (!el) return;
    body[f.name] = f.type === 'toggle' ? (el.checked ? 1 : 0) : el.value;
  });
  await api(`/api/modules/${slug}`, { method: 'POST', body: JSON.stringify(body) });
  closeModal();
  renderDynamicModule(slug);
}

async function deleteDynamicRecord(slug, id) {
  if (!confirm('¿Eliminar este registro?')) return;
  await api(`/api/modules/${slug}/${id}`, { method: 'DELETE' });
  renderDynamicModule(slug);
}

// ── BOOTSTRAP ──────────────────────────────────────────────────
init();
</script>
</body>
</html>
