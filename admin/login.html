<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — inicio.red.bo</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-primary);
      font-family: var(--font-sans);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: var(--space-10);
      background: var(--color-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
    }
    .login-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .login-logo .dot { color: var(--color-accent-primary); }
    .login-logo h1 {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-1);
    }
    .login-logo p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .form-group {
      margin-bottom: var(--space-5);
    }
    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }
    .form-input {
      width: 100%;
      padding: 10px var(--space-4);
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-lg);
      color: var(--color-text-primary);
      font-size: var(--text-base);
      font-family: var(--font-sans);
      transition: border-color var(--transition-fast);
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-accent-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--color-accent-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      font-family: var(--font-sans);
      cursor: pointer;
      transition: opacity var(--transition-fast), transform var(--transition-fast);
      margin-top: var(--space-6);
    }
    .login-btn:hover { opacity: .9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .error-msg {
      padding: var(--space-3) var(--space-4);
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius-md);
      color: #f87171;
      font-size: var(--text-sm);
      margin-top: var(--space-4);
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .back-link a { color: var(--color-accent-primary); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1><span class="dot">·</span>inicio<span class="dot">.</span>red<span class="dot">.</span>bo</h1>
      <p>Panel de administración</p>
    </div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="admin@inicio.red.bo" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="error-msg" role="alert"></div>
      <button class="login-btn" type="submit" id="submit-btn">Iniciar sesión</button>
    </form>
    <p class="back-link"><a href="/">← Volver al sitio</a></p>
  </div>

  <script>
    (function () {
      const token = localStorage.getItem('admin_token');
      if (token) window.location.replace('/admin/');

      const form = document.getElementById('login-form');
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');

      function showErr(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      form.addEventListener('submit', async e => {
        e.preventDefault();
        errEl.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showErr('Completa todos los campos'); return; }

        btn.disabled = true;
        btn.textContent = 'Iniciando...';

        try {
          const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'Error de autenticación');
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.user));
          window.location.replace('/admin/');
        } catch (err) {
          showErr(err.message);
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
        }
      });
    })();
  </script>
</body>
</html>
