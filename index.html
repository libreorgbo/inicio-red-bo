<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="inicio.red.bo — Directorio de enlaces curado para Bolivia y Latinoamérica." />
  <meta name="theme-color" content="#0a0a0f" />
  <meta property="og:title" content="inicio.red.bo" />
  <meta property="og:description" content="Directorio de enlaces curado para Bolivia y Latinoamérica." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <title>inicio.red.bo — Directorio Digital Bolivia</title>
  <style>
    /* Search highlight */
    mark.search-highlight {
      background: rgba(99,102,241,.3);
      color: inherit;
      border-radius: 2px;
      padding: 0 2px;
    }
    /* Category tabs */
    #category-tabs {
      display: flex;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--color-glass-border);
    }
    #category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0;
      padding: 6px var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-glass-border);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
    }
    .cat-tab:hover { color: var(--color-text-primary); background: var(--color-glass); }
    .cat-tab.active { background: var(--color-accent-primary); color: #fff; border-color: var(--color-accent-primary); }
    /* Load more */
    .load-more-container {
      display: flex;
      justify-content: center;
      padding: var(--space-8) 0;
    }
    #load-more-btn {
      padding: 10px var(--space-8);
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-full);
      color: var(--color-text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    #load-more-btn:hover { background: var(--color-bg-tertiary); }
    #load-more-btn:disabled { opacity: .5; cursor: not-allowed; }
    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: var(--z-toast, 900);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    /* Dynamic modules */
    #dynamic-modules .dyn-module { margin-bottom: var(--space-8); }
    .module-title {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-4);
    }
    .module-list { list-style: none; display: flex; flex-direction: column; gap: var(--space-2); }
    .module-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .module-item:hover { background: var(--color-bg-tertiary); transform: translateX(4px); }
    .rank {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent-primary);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-title { display: block; font-weight: var(--weight-medium); font-size: var(--text-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-domain { display: block; font-size: var(--text-xs); color: var(--color-text-secondary); }
    .item-desc { display: block; font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-1); }
    .item-clicks { font-size: var(--text-xs); color: var(--color-text-tertiary); flex-shrink: 0; }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-3);
    }
    .module-grid--wide { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .module-card {
      padding: var(--space-4);
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .module-card:hover { transform: translateY(-2px); background: var(--color-bg-tertiary); }
    .module-card--featured { border-color: rgba(99,102,241,.3); }
    .cat-badge {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(99,102,241,.15);
      color: var(--color-accent-primary);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      text-transform: uppercase;
      width: fit-content;
    }
    .trending-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .trending-tag {
      padding: 6px var(--space-4);
      background: var(--color-glass);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-full);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .trending-tag:hover { background: var(--color-accent-primary); color: #fff; border-color: var(--color-accent-primary); }
    /* External search banner */
    #external-search-banner { display: none; }
  </style>
</head>
<body>

  <!-- Marquee -->
  <div class="marquee-wrapper" role="banner" aria-label="Sitios relacionados">
    <div class="marquee-track" id="marquee-track" aria-hidden="true">
      <span class="marquee-content" id="marquee-content"></span>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header" role="banner">
    <a href="/" class="logo" aria-label="inicio.red.bo — Inicio">
      <span class="logo-dot"></span>
      <span class="logo-text">inicio<span class="logo-accent">.red.bo</span></span>
    </a>

    <div class="search-glass-wrapper" role="search">
      <!-- Search engine tabs -->
      <nav class="search-tabs" role="tablist" aria-label="Motor de búsqueda">
        <button class="search-tab active" role="tab" data-tab="web" aria-selected="true">Web</button>
        <button class="search-tab" role="tab" data-tab="videos" aria-selected="false">Videos</button>
        <button class="search-tab" role="tab" data-tab="noticias" aria-selected="false">Noticias</button>
        <button class="search-tab" role="tab" data-tab="torrents" aria-selected="false">Torrents</button>
        <button class="search-tab" role="tab" data-tab="subtitulos" aria-selected="false">Subtítulos</button>
      </nav>
      <div class="search-glass-container">
        <label for="search-input" class="sr-only">Buscar en inicio.red.bo</label>
        <div class="search-input-wrapper">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" id="search-input" name="q" class="search-input"
                 placeholder="Buscar en la web..." autocomplete="off" autocorrect="off" spellcheck="false" />
          <button type="button" class="search-clear" id="search-clear" aria-label="Limpiar búsqueda" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="bento-trigger-wrapper">
      <button class="bento-trigger" id="bento-btn" aria-label="Menú principal" aria-expanded="false" aria-controls="sidebar">
        <span class="bento-grid" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar" role="dialog" aria-modal="true" aria-label="Menú lateral" hidden></aside>

  <!-- External search banner (injected by search.js) -->
  <div id="external-search-banner"></div>

  <!-- Search results panel -->
  <section class="search-results-panel" id="search-results-panel" aria-label="Resultados de búsqueda" hidden>
    <div class="search-results-header">
      <span id="search-results-query"></span>
      <button class="btn-close-results" id="btn-close-results">Volver al directorio</button>
    </div>
    <div class="search-results-grid" id="search-results-grid" role="list"></div>
  </section>

  <!-- Category tabs (rendered by app.js) -->
  <div id="category-tabs" role="tablist" aria-label="Filtrar por categoría"></div>

  <!-- Main -->
  <main class="main-content" id="main-content" role="main">
    <div class="ad-slot ad-slot--mid-banner" data-slot-id="mid-banner" aria-label="Publicidad"></div>

    <!-- Links grid -->
    <section class="cards-grid" id="links-grid" aria-label="Directorio de enlaces" aria-live="polite"></section>

    <!-- Load more -->
    <div class="load-more-container" style="display:none">
      <button id="load-more-btn">Cargar más</button>
    </div>

    <div class="scroll-sentinel" id="scroll-sentinel" aria-hidden="true"></div>

    <div class="loading-indicator" id="loading-indicator" hidden aria-live="polite">
      <div class="loading-spinner" aria-label="Cargando más enlaces"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <p class="footer-copy">
      &copy; <span id="footer-year"></span> red.bo —
      <a href="/privacidad">Privacidad</a> ·
      <a href="/terminos">Términos</a> ·
      <a href="/contacto">Contacto</a> ·
      <a href="/admin/">Admin</a>
    </p>
  </footer>

  <!-- Tooltip -->
  <div class="tooltip-global" id="tooltip-global" role="tooltip" aria-hidden="true" hidden>
    <div class="tooltip-favicon"></div>
    <div class="tooltip-body">
      <strong class="tooltip-title"></strong>
      <p class="tooltip-desc"></p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts -->
  <script src="/js/sidebar.js" defer></script>
  <script src="/js/render.js" defer></script>
  <script src="/js/search.js" defer></script>
  <script src="/js/ads.js" defer></script>
  <script src="/js/modules.js" defer></script>
  <script src="/js/app.js" defer></script>

  <script>
    // Footer year
    document.getElementById('footer-year').textContent = new Date().getFullYear();
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[SW] registered:', r.scope))
          .catch(e => console.warn('[SW] error:', e));
      });
    }
  </script>
</body>
</html>
