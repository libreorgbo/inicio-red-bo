<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="refresh" content="{{SECS}};url={{URL}}"/>
<title>Redirigiendo — inicio.red.bo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --accent:#6366f1;
  --accent2:#8b5cf6;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.5);
  --border:rgba(255,255,255,.08);
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Sora,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.12) 0%,transparent 70%);
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:2.5rem 2rem;
  text-align:center;
  max-width:480px;
  width:calc(100% - 2rem);
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
}
.logo{font-size:.875rem;color:var(--muted);margin-bottom:2rem;letter-spacing:.05em}
.logo span{color:var(--accent)}
.countdown-ring{position:relative;width:128px;height:128px;margin:0 auto 1.5rem}
.countdown-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1e1e2a;stroke-width:8}
.ring-progress{
  fill:none;
  stroke:url(#grad);
  stroke-width:8;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
}
.count-display{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.count-num{font-size:2.75rem;font-weight:700;color:var(--accent);line-height:1}
.count-label{font-size:.625rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:2px}
.ad-slot{
  background:#0d0d14;
  border:1px dashed var(--border);
  border-radius:12px;
  padding:1rem;
  margin:1.25rem 0;
  min-height:90px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:.75rem;
}
h2{font-size:1.125rem;font-weight:600;margin-bottom:.5rem}
.dest-url{
  color:var(--muted);font-size:.8rem;
  word-break:break-all;margin-bottom:1.5rem;
  background:#0d0d14;border-radius:8px;padding:.5rem .75rem;
}
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;text-decoration:none;
  padding:.8rem 2rem;border-radius:14px;
  font-weight:600;font-size:1rem;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  transition:transform .15s,opacity .15s;
}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.progress-bar{
  width:100%;height:3px;background:#1a1a24;
  border-radius:2px;margin-top:1.25rem;overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  width:100%;
  transition:width 1s linear;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">inicio<span>.red.bo</span></div>

  <div class="countdown-ring">
    <svg width="128" height="128">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="64" cy="64" r="54"/>
      <circle class="ring-progress" cx="64" cy="64" r="54"
        stroke-dasharray="{{CIRC}}"
        stroke-dashoffset="0"
        id="ring-progress"/>
    </svg>
    <div class="count-display">
      <span class="count-num" id="count-num">{{SECS}}</span>
      <span class="count-label">seg</span>
    </div>
  </div>

  <div class="ad-slot" id="ad-slot">
    <!-- Ad injection point -->
    <span>Publicidad</span>
  </div>

  <h2>Serás redirigido automáticamente</h2>
  <div class="dest-url">{{URL}}</div>
  <a href="{{URL}}" class="btn" id="go-btn">Ir ahora →</a>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>
<script>
(function(){
  const TOTAL = {{SECS}};
  const URL = '{{URL_JS}}';
  const CIRC = {{CIRC}};
  let remaining = TOTAL;
  const ring = document.getElementById('ring-progress');
  const countEl = document.getElementById('count-num');
  const fillEl = document.getElementById('progress-fill');

  const tick = setInterval(function(){
    remaining--;
    countEl.textContent = remaining;
    ring.style.strokeDashoffset = CIRC * (1 - remaining / TOTAL);
    fillEl.style.width = ((remaining / TOTAL) * 100) + '%';
    if (remaining <= 0) {
      clearInterval(tick);
      window.location.href = URL;
    }
  }, 1000);

  // Load ad
  fetch('/api/ads/next').then(r=>r.json()).then(data=>{
    if (data.ad && data.ad.script_code_or_html) {
      document.getElementById('ad-slot').innerHTML = data.ad.script_code_or_html;
    }
  }).catch(()=>{});
})();
</script>
</body>
</html>
