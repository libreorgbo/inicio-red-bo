name = "inicio-red-bo"
main = "src/worker.js"
compatibility_date = "2026-05-27"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "redbo-main"
database_id = "local-redbo-main"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "local-kv-cache"

[vars]
GOOGLE_REDIRECT_URI = "https://inicio.red.bo/auth/callback"
OWNER_AFFILIATE_TAG = ""

[assets]
directory = "public"

[triggers]
crons = ["0 4 * * *"]
